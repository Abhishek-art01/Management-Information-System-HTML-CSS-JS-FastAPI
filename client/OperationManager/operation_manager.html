<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Downloads — MIS</title>
  <link rel="stylesheet" href="/components-static/theme.css">
  <link rel="stylesheet" href="/components-static/Sidebar.css">
  <script src="/components-static/Sidebar.js" defer></script>
</head>
<body class="page-wrapper">

  <main class="main-content">

    <header class="topbar">
      <div class="topbar-title">
        ↓ Downloads
        <span class="badge">Export Data</span>
      </div>
      <div class="topbar-right">
        <div class="user-chip"><div class="user-avatar">U</div></div>
      </div>
    </header>

    <div class="content">

      <div class="section-header">
        <div class="section-title">Export Options</div>
      </div>

      <div style="display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:14px;">

        <div class="card">
          <div class="card-header">
            <div style="display:flex;align-items:center;gap:10px;">
              <span class="stat-icon icon-red">◎</span>
              <h4>Client Data</h4>
            </div>
          </div>
          <p style="font-size:.82rem; margin-bottom:18px;">Download all processed client trip data</p>
          <button class="btn btn-outline btn-sm dl-btn" data-endpoint="/download/client-data" data-fname="client_data.xlsx">
            ↓ Download Excel
          </button>
        </div>

        <div class="card">
          <div class="card-header">
            <div style="display:flex;align-items:center;gap:10px;">
              <span class="stat-icon icon-cyan">◈</span>
              <h4>Trip Data</h4>
            </div>
          </div>
          <p style="font-size:.82rem; margin-bottom:18px;">Download complete trip records</p>
          <button class="btn btn-outline btn-sm dl-btn" data-endpoint="/download/trip-data" data-fname="trip_data.xlsx">
            ↓ Download Excel
          </button>
        </div>

        <div class="card">
          <div class="card-header">
            <div style="display:flex;align-items:center;gap:10px;">
              <span class="stat-icon icon-green">⬡</span>
              <h4>Locality Master</h4>
            </div>
          </div>
          <p style="font-size:.82rem; margin-bottom:18px;">Export full address–locality–zone mapping table</p>
          <button class="btn btn-outline btn-sm dl-btn" data-endpoint="/download/localities" data-fname="locality_master.xlsx">
            ↓ Download Excel
          </button>
        </div>

        <div class="card">
          <div class="card-header">
            <div style="display:flex;align-items:center;gap:10px;">
              <span class="stat-icon icon-amber">◉</span>
              <h4>Toll Data</h4>
            </div>
          </div>
          <p style="font-size:.82rem; margin-bottom:18px;">Export all toll transaction records</p>
          <button class="btn btn-outline btn-sm dl-btn" data-endpoint="/download/toll-data" data-fname="toll_data.xlsx">
            ↓ Download Excel
          </button>
        </div>

      </div>

      <div id="dl-status" style="margin-top:20px;"></div>

    </div>
  </main>

  <script>
  document.querySelectorAll(".dl-btn").forEach(btn => {
    btn.addEventListener("click", async () => {
      const endpoint = btn.dataset.endpoint;
      const fname    = btn.dataset.fname;
      const status   = document.getElementById("dl-status");

      btn.disabled = true;
      btn.textContent = "⌛ Preparing…";
      status.innerHTML = "";

      try {
        const res = await fetch(endpoint);
        if (!res.ok) { const e=await res.json().catch(()=>({})); throw new Error(e.detail||res.statusText); }
        const blob = await res.blob();
        const url  = URL.createObjectURL(blob);
        const a = document.createElement("a"); a.href=url; a.download=fname; a.click();
        status.innerHTML = `<div class="alert alert-success">✓ ${fname} downloaded</div>`;
      } catch(e) {
        status.innerHTML = `<div class="alert alert-error">⚠ ${e.message}</div>`;
      } finally {
        btn.disabled = false;
        btn.textContent = "↓ Download Excel";
      }
    });
  });
  </script>
</body>
</html>
